<meta
  name="viewport"
  content="width=device-width, initial-scale=1"
/><!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oshxona Buyurtmalari</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        margin: 0;
        padding: 20px;
      }

      .container {
        max-width: 800px;
        margin: 0 auto;
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }

      h1 {
        text-align: center;
        color: #333;
      }

      #orders-list {
        list-style: none;
        padding: 0;
      }

      #orders-list li {
        padding: 10px;
        border-bottom: 1px solid #ddd;
        margin-bottom: 10px;
      }

      button {
        background-color: #dc3545;
        color: white;
        border: none;
        padding: 8px 12px;
        border-radius: 4px;
        cursor: pointer;
      }

      button:hover {
        background-color: #c82333;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Oshxona Buyurtmalari</h1>
      <ul id="orders-list"></ul>
      <button onclick="clearOrders()">Barcha buyurtmalarni tozalash</button>
      <!--<p><a href="index.html">Menyu sahifasiga o'tish</a></p>-->
    </div>
    <script>
      function loadOrders() {
        const ordersList = document.getElementById("orders-list");
        try {
          const submittedOrders =
            JSON.parse(localStorage.getItem("submittedOrders")) || [];
          ordersList.innerHTML = "";
          if (submittedOrders.length === 0) {
            ordersList.innerHTML = "<li>Hozircha buyurtmalar yo‘q</li>";
            return;
          }

          // Taom nomiga qarab rasm yo‘llarini belgilash
          const imageMap = {
            Osh: "images/osh.jpg",
            Somsa: "images/somsa.jpg",
            Shashlik: "images/shashlik.jpg",
          };

          submittedOrders.forEach((order) => {
            const li = document.createElement("li");
            let itemsHtml = order.items
              .map((item) => {
                const imgSrc = imageMap[item.item] || "images/default.jpg";
                return `
          <div style="display: flex; align-items: center; margin-bottom: 5px;">
            <img src="${imgSrc}" alt="${item.item}" style="width: 60px; height: 60px; object-fit: cover; margin-right: 10px; border-radius: 6px;">
            <span>${item.item}: ${item.price} UZS</span>
          </div>
        `;
              })
              .join("");

            li.innerHTML = `
        <strong>Buyurtma ID: ${order.id}</strong><br>
        ${itemsHtml}
        <strong>Jami:</strong> ${order.total} UZS<br>
        <strong>Vaqt:</strong> ${new Date(order.timestamp).toLocaleString(
          "uz-UZ"
        )}
      `;
            ordersList.appendChild(li);
          });
        } catch (error) {
          ordersList.innerHTML =
            "<li>Buyurtmalarni yuklashda xato: " + error.message + "</li>";
        }
      }
      // Buyurtmalarni tozalash
      function clearOrders() {
        if (confirm("Barcha buyurtmalarni ochirishni xohlaysizmi?")) {
          try {
            localStorage.removeItem("submittedOrders");
            loadOrders();
            alert("Buyurtmalar tozalandi!");
          } catch (error) {
            alert("Tozalashda xato: " + error.message);
          }
        }
      }

      // Sahifa yuklanganda buyurtmalarni yuklash
      window.onload = loadOrders;

      // Har 5 soniyada yangilash (tezroq sinash uchun)
      setInterval(loadOrders, 5000);
    </script>
  </body>
</html>
